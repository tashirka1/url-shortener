x-logging-template: &default-logging
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"

services:
  app:
    build:
      dockerfile: ./Dockerfile
    <<: *default-logging
    restart: always
    env_file: .env
    volumes:
      - ".env:/app/.env"
      - "./db:/app/db"
    ports:
      - "8001:8000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -s http://localhost:8000/status/health | grep -q 'ok' || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s
