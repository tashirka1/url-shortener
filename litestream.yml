access-key-id: ${LITESTREAM_ACCESS_KEY_ID}
secret-access-key: ${LITESTREAM_SECRET_ACCESS_KEY}
region: us-east-1
endpoint: https://s3.ru1.storage.beget.cloud
sync-interval: 10s

dbs:
  - path: /db/main.db
    replica:
      type: s3
      bucket: 5e8ff288febf-sqlite-backups
      force-path-style: true
      path: url-shortener
